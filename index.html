<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planned Measures — Datasport</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #F7F6F3; color: #1a1a1a; font-size: 14px; line-height: 1.5; padding: 2rem; }
  .page { max-width: 1100px; margin: 0 auto; }
  .top { margin-bottom: 2rem; }
  .top h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .top p { font-size: 13px; color: #888; }
  .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 2rem; }
  .metric { background: #fff; border: 0.5px solid #e0ddd6; border-radius: 10px; padding: 1rem 1.125rem; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 600; color: #111; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
  .filters-group { margin-bottom: 1.5rem; }
  .filter-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #bbb; margin-right: 2px; white-space: nowrap; }
  .filter-btn { font-size: 13px; padding: 5px 14px; border-radius: 20px; border: 1px solid #d8d5ce; background: #fff; color: #666; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .filter-btn:hover { border-color: #aaa; color: #333; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .dot-global { background: #c8c41a; }
  .dot-coach { background: #E24B4A; }
  .dot-b2b { background: #1D9E75; }
  .dot-b2c { background: #378ADD; }
  .dot-data { background: #7F77DD; }
  .dot-magazine { background: #51cad0; }
  .stream-section { margin-bottom: 2rem; }
  .stream-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; }
  .table-wrap { background: #fff; border: 0.5px solid #e0ddd6; border-radius: 10px; overflow: hidden; }
  .col-headers { display: grid; grid-template-columns: 2.2fr 0.8fr 0.8fr 0.8fr 0.8fr; padding: 8px 16px; background: #F7F6F3; border-bottom: 0.5px solid #e0ddd6; }
  .col-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #999; }
  .measure-row { display: grid; grid-template-columns: 2.2fr 0.8fr 0.8fr 0.8fr 0.8fr; padding: 11px 16px; border-bottom: 0.5px solid #f0ede8; align-items: center; transition: background 0.1s; }
  .measure-row:last-child { border-bottom: none; }
  .measure-row:hover { background: #faf9f7; }
  .measure-row.is-done { background: #f2faf5; }
  .measure-row.is-done:hover { background: #e8f6ed; }
  .measure-row.is-done .measure-name { color: #2d6a4a; }
  .measure-row.is-done .measure-sub { color: #6aab87; }
  .measure-row.is-inprogress { background: #fffbf2; }
  .measure-row.is-inprogress:hover { background: #fef6e4; }
  .measure-row.is-inprogress .measure-name { color: #7a4a0a; }
  .measure-row.is-inprogress .measure-sub { color: #b8894a; }
  .measure-name { font-size: 13.5px; color: #111; font-weight: 500; line-height: 1.35; }
  .measure-sub { font-size: 12px; color: #999; margin-top: 2px; font-weight: 400; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; display: inline-block; font-weight: 500; white-space: nowrap; }
  .badge-q { background: #F0EDE8; color: #666; }
  .effort-low  { background: #EAF3DE; color: #3B6D11; }
  .effort-med  { background: #FFF3DC; color: #854F0B; }
  .effort-high { background: #FDECEC; color: #A32D2D; }
  .effort-vhigh { background: #EEEDFE; color: #534AB7; }
  .impact-low   { background: #F0EDE8; color: #888; }
  .impact-med   { background: #EBF3FD; color: #185FA5; }
  .impact-high  { background: #EAF3DE; color: #3B6D11; }
  .impact-vhigh { background: #EEEDFE; color: #534AB7; }
  .status-todo       { background: #F0EDE8; color: #888; }
  .status-inprogress { background: #FFF3DC; color: #854F0B; }
  .status-done       { background: #EAF3DE; color: #3B6D11; }
  @media (max-width: 700px) {
    body { padding: 1rem; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .col-headers, .measure-row { grid-template-columns: 1fr 1fr; }
    .col-header:not(:first-child):not(:nth-child(3)), .measure-row > *:not(:first-child):not(:nth-child(3)) { display: none; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1>Planned Measures</h1>
    <p>6 streams · 4 quarters · Effort / impact view</p>
  </div>
  <div class="summary" id="summary"></div>
  <div class="filters-group">
    <div class="filters" id="filters">
      <span class="filter-label">Stream</span>
      <button class="filter-btn active" data-stream="all">All</button>
      <button class="filter-btn" data-stream="global"><span class="dot dot-global"></span>Global</button>
      <button class="filter-btn" data-stream="coach"><span class="dot dot-coach"></span>Quick Wins Coach</button>
      <button class="filter-btn" data-stream="b2b"><span class="dot dot-b2b"></span>B2B</button>
      <button class="filter-btn" data-stream="b2c"><span class="dot dot-b2c"></span>B2C</button>
      <button class="filter-btn" data-stream="data"><span class="dot dot-data"></span>Data collection</button>
      <button class="filter-btn" data-stream="magazine"><span class="dot dot-magazine"></span>Fit for Life Magazine</button>
    </div>
    <div class="filters" id="status-filters">
      <span class="filter-label">Status</span>
      <button class="filter-btn active" data-status="all">All</button>
      <button class="filter-btn" data-status="todo">To do</button>
      <button class="filter-btn" data-status="inprogress">In progress</button>
      <button class="filter-btn" data-status="done">Done</button>
    </div>
  </div>
  <div id="table-container"></div>
</div>

<script>

  { stream:"global", name:"Sleeping accounts - retargeting", sub:"personalized retargeting campaigns", q:"Q4 2026", effort:"high", impact:"low", status:"todo" },

  { stream:["coach","magazine"], name:"Athlete search page CTA Coach", sub:"teasing for the coach on results page?", q:"Q3 2026", effort:"low", impact:"low", status:"todo" },
  { stream:["coach","magazine"], name:"myDS ab tests on teasing", sub:"to be set up after implementation", q:"Q4 2026", effort:"low", impact:"vhigh", status:"todo" },
  { stream:"coach", name:"Fit for Life Coach KPIs", sub:"define list of KPIs that are missing", q:"Q3 2026", effort:"high", impact:"high", status:"inprogress" },
  { stream:"coach", name:"Tracking reporting", sub:"create a global reporting with metabase + analytics", q:"Q4 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"coach", name:"Satisfation online form", sub:"create an online form to check satisfaction", q:"Q3 2026", effort:"low", impact:"low", status:"done" },

  { stream:"b2b", name:"Custom events GA4", sub:"page_view, reg_start, reg_complete, payment_complete", q:"Q3 2026", effort:"med", impact:"high", status:"inprogress" },
  { stream:"b2b", name:"Heatmap tool + drop-out session recording", sub:"Define if we already have a tool", q:"Q3 2026", effort:"low", impact:"high", status:"todo" },
  { stream:"b2b", name:"Event online subscription reporting", sub:"reporting for each event and global overview of events for SSM members", q:"Q3 2026", effort:"med", impact:"med", status:"todo" },

  { stream:"b2b", name:"Lifecycle comms — urgency triggers", sub:"Deadline-based messaging (closing soon, spots left...)", q:"Q4 2026", effort:"med", impact:"high", status:"todo" },
  { stream:"b2b", name:"Lifecycle comms — social proof", sub:"Inject participant count, testimonials in comms", q:"Q4 2026", effort:"med", impact:"med", status:"todo" },
  { stream:"b2b", name:"NPS survey post 48h", sub:"", q:"Q4 2026", effort:"low", impact:"med", status:"todo" },
  { stream:"b2b", name:"Best practices content + activation", sub:"Regular sessions with organizers", q:"Q1 2027", effort:"med", impact:"med", status:"todo" },
  { stream:"b2b", name:"B2B KPIs", sub:"define list of KPIs that are missing", q:"Q3 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"b2b", name:"Sparta Co-Pilot — AI Marketing Co-pilot", sub:"POC · AI campaign generator per segment × gate × channel, smart athlete segmentation, brand voice upload · Copenhagen Marathon demo", q:"Q3 2026", effort:"vhigh", impact:"vhigh", status:"done" },
  { stream:"b2b", name:"AI Campaign Manager tool", sub:"AI tool to help event organizers to create their campaigns", q:"Q3 2026", effort:"vhigh", impact:"high", status:"todo" },
  { stream:"b2b", name:"AI Assets Creation tool", sub:"AI tool to help event organizers to create their assets", q:"Q3 2026", effort:"vhigh", impact:"high", status:"todo" },
  { stream:"b2b", name:"Referal Program", sub:"refer a friend", q:"Q3 2026", effort:"med", impact:"vhigh", status:"todo" },
  { stream:"b2b", name:"Online conversion tracking for events organizers", sub:"check how to report conversions for our event organizers", q:"Q4 2026", effort:"high", impact:"vhigh", status:"todo" },
  
  { stream:"b2c", name:"Sleeping accounts — audit + actionable channels", sub:"Emails, notifications, retargeting", q:"Q3 2026", effort:"vhigh", impact:"med", status:"todo" },
  { stream:"b2c", name:"Content audit + entry point mapping", sub:"Confirmation email, 4MPR, 2MPR, After Race, Waiting page", q:"Q3 2026", effort:"med", impact:"high", status:"todo" },
  { stream:"b2c", name:"Product × timing matrix", sub:"CR by touchpoint: FfL coach, magazine, partnerships", q:"Q3 2026", effort:"low", impact:"high", status:"todo" },
  { stream:"b2c", name:"Performance - Personalized data", sub:"check what personalized data we can bring to athletes", q:"Q4 2026", effort:"high", impact:"med", status:"todo" },
  { stream:"b2c", name:"Performance - Progress tracking", sub:"import information about their trainings to compare with their subscribed athletes", q:"Q4 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"b2c", name:"Performance - Datasport Index", sub:"create a datasport index ranking method", q:"Q4 2026", effort:"vhigh", impact:"high", status:"todo" },
  { stream:"b2c", name:"Performance - Pofile-based content", sub:"map the type of athletes and provide related content (beg / advanced)", q:"Q4 2026", effort:"vhigh", impact:"high", status:"todo" },

  { stream:"b2c", name:"Race - Race recommendation", sub:"create a tool to have personalized recommendations of races to athletes", q:"Q4 2026", effort:"vhigh", impact:"high", status:"todo" },
  { stream:"b2c", name:"Race - Application", sub:"Could we create an app where event organizers can push content for athletes?", q:"Q4 2026", effort:"vhigh", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Race - Partnerships", sub:"Offer partnerships to cross sell products to athletes", q:"Q4 2026", effort:"vhigh", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Gamification - Challenge friends", sub:"create datasport challenges between friends", q:"Q4 2026", effort:"vhigh", impact:"high", status:"todo" },
  { stream:"b2c", name:"Gamification - Badges with exclusive accesses", sub:"access to sales, partnerships etc...", q:"Q4 2026", effort:"vhigh", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Products - define products in scope", sub:"Define all products in our scope to be offered", q:"Q4 2026", effort:"high", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Products - new products", sub:"check if we can have new products to offer to our athletes", q:"Q4 2026", effort:"high", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Persona - Segmentation", sub:"Create a dynamical Segmentation of our athletes", q:"Q4 2026", effort:"high", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Persona - Conversion-based matrix", sub:"define likelihood of conversions x products", q:"Q4 2026", effort:"high", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"Persona - Upselling strategy by persona", sub:"Create the persona strategy", q:"Q4 2026", effort:"high", impact:"vhigh", status:"todo" },
  { stream:"b2c", name:"B2C KPIs", sub:"define list of KPIs that are missing", q:"Q3 2026", effort:"vhigh", impact:"vhigh", status:"todo" },
  
  { stream:"data", name:"Athlete Intelligence mapping", sub:"map all information we have on athletes and what we can get", q:"Q3 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"data", name:"Athlete Intelligence collection strategy", sub:"see what tools we can use (online forms, incentives, discounts etc...)", q:"Q3 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"data", name:"Athlete Intelligence stake holder alignment", sub:"check with SSM team what could be interesting for the event organizers", q:"Q3 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"data", name:"Race goal", sub:"1 select at registration — coaching segmentation", q:"Q3 2026", effort:"low", impact:"vhigh", status:"todo" },
  { stream:"data", name:"Experience level", sub:"Radio button at registration — Beginners → coaching / Confirmed → upsell", q:"Q3 2026", effort:"low", impact:"vhigh", status:"todo" },
  { stream:"data", name:"Acquisition source", sub:"At registration — ROI by channel, clubs as B2B lever", q:"Q3 2026", effort:"low", impact:"high", status:"todo" },
  { stream:"data", name:"Next planned event", sub:"3-question survey in diploma email", q:"Q3 2026", effort:"low", impact:"high", status:"todo" },
  { stream:"data", name:"Gap goal vs result", sub:"Back-end calc → automated coaching email 48h post-event", q:"Q3 2026", effort:"med", impact:"high", status:"todo" },
  { stream:"data", name:"Multi-event history", sub:"Strava / Garmin integration — loyalty + LTV predictor", q:"Q4 2026", effort:"high", impact:"high", status:"todo" },
  { stream:"data", name:"Equipment brands", sub:"Optional enriched profile + incentive — partner pitch", q:"Q4 2026", effort:"low", impact:"med", status:"todo" },
  { stream:"data", name:"Annual running budget", sub:"Enriched profile <500 / 500-1500 / 1500-3000 / 3000+ CHF", q:"Q4 2026", effort:"low", impact:"med", status:"todo" },
  { stream:"data", name:"Other sports", sub:"Enriched profile to know if they practice others sports", q:"Q4 2026", effort:"low", impact:"med", status:"todo" },
  { stream:"data", name:"Club Members", sub:"Information on knowing if they belong to sports clubs", q:"Q4 2026", effort:"low", impact:"med", status:"todo" },
 
  { stream:"magazine", name:"Fit for Life magazine — plan", sub:"To discuss with stakeholdes", q:"Q4 2026", effort:"vhigh", impact:"vhigh", status:"todo" },
];

const streamMeta = {
  global:   { label:"Global", dot:"dot-global" },
  coach:    { label:"Quick Wins Coach", dot:"dot-coach" },
  b2b:      { label:"B2B", dot:"dot-b2b" },
  b2c:      { label:"B2C", dot:"dot-b2c" },
  data:     { label:"Data collection", dot:"dot-data" },
  magazine: { label:"Fit for Life Magazine", dot:"dot-magazine" },
};
const effortLabels = { low:"Low", med:"Medium", high:"High", vhigh:"Very High" };
const impactLabels = { low:"Low", med:"Medium", high:"High", vhigh:"Very high" };
const statusLabels = { todo:"To do", inprogress:"In progress", done:"Done" };

let activeStream = "all";
let activeStatus = "all";

function renderSummary(data) {
  const total      = data.length;
  const done       = data.filter(m => m.status === "done").length;
  const inprogress = data.filter(m => m.status === "inprogress").length;
  const quickWins  = data.filter(m => m.effort === "low" && (m.impact === "high" || m.impact === "vhigh")).length;
  const q3         = data.filter(m => m.q === "Q3 2026").length;
  document.getElementById("summary").innerHTML = `
    <div class="metric"><div class="metric-label">Total measures</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Done</div><div class="metric-value" style="color:#2d6a4a">${done}</div></div>
    <div class="metric"><div class="metric-label">In progress</div><div class="metric-value" style="color:#854F0B">${inprogress}</div></div>
    <div class="metric"><div class="metric-label">Quick wins</div><div class="metric-value">${quickWins}</div></div>
    <div class="metric"><div class="metric-label">To deliver Q3 2026</div><div class="metric-value">${q3}</div></div>
  `;
}

function inStream(m, s) {
  return Array.isArray(m.stream) ? m.stream.includes(s) : m.stream === s;
}

function renderTable() {
  const streams = activeStream === "all" ? ["global","coach","b2b","b2c","data","magazine"] : [activeStream];
  const filtered = measures.filter(m =>
    (activeStream === "all" || inStream(m, activeStream)) &&
    (activeStatus === "all" || m.status === activeStatus)
  );
  renderSummary(filtered);
  let html = "";
  streams.forEach(s => {
    const rows = measures.filter(m =>
      inStream(m, s) &&
      (activeStatus === "all" || m.status === activeStatus)
    );
    if (!rows.length) return;
    const meta = streamMeta[s];
    html += `<div class="stream-section">
      <div class="stream-label"><span class="dot ${meta.dot}"></span>${meta.label}</div>
      <div class="table-wrap">
        <div class="col-headers">
          <div class="col-header">Measure</div>
          <div class="col-header">Quarter</div>
          <div class="col-header">Effort</div>
          <div class="col-header">Impact</div>
          <div class="col-header">Status</div>
        </div>`;
    rows.forEach(m => {
      html += `<div class="measure-row${m.status === 'done' ? ' is-done' : m.status === 'inprogress' ? ' is-inprogress' : ''}">
        <div><div class="measure-name">${m.name}</div>${m.sub ? `<div class="measure-sub">${m.sub}</div>` : ""}</div>
        <div><span class="badge badge-q">${m.q}</span></div>
        <div><span class="badge effort-${m.effort}">${effortLabels[m.effort]}</span></div>
        <div><span class="badge impact-${m.impact}">${impactLabels[m.impact]}</span></div>
        <div><span class="badge status-${m.status}">${statusLabels[m.status]}</span></div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById("table-container").innerHTML = html;
}

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeStream = btn.dataset.stream;
  document.querySelectorAll("#filters .filter-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderTable();
});

document.getElementById("status-filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeStatus = btn.dataset.status;
  document.querySelectorAll("#status-filters .filter-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderTable();
});

renderTable();
</script>
</body>
</html>
