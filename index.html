  { stream:"magazine", category:"Strategy & foundations", name:"Fit for Life magazine — plan", sub:"To discuss with stakeholdes", months:["2026-07","2026-09"], effort:"vhigh", impact:"vhigh", status:"inprogress", type:"foundation" },
  { stream:"magazine", category:"Touchpoints & teasers", name:"Website Home Datasport", sub:"Pre-race touchpoint — magazine presence on the Datasport home page", months:["2026-07","2026-09"], effort:"med", impact:"med", status:"todo" },
  { stream:"magazine", category:"Touchpoints & teasers", name:"Online registration (OnReg)", sub:"Pre-race touchpoint — magazine offer during online race registration", months:["2026-07","2026-09"], effort:"med", impact:"vhigh", status:"todo" },
  { stream:"magazine", category:"Strategy & foundations", name:"Fit for Life Website", sub:"Optimize the website to increase conversions on the magazine via touchpoints", months:["2026-10","2026-12"], effort:"med", impact:"med", status:"todo" },
  { stream:"magazine", category:"Touchpoints & teasers", name:"Mail - Datasport Newsletter", sub:"Pre-race touchpoint — Product teasing in the Datasport newsletter", months:["2026-10","2026-12"], effort:"low", impact:"med", status:"todo" },
  { stream:"magazine", category:"Touchpoints & teasers", name:"CTA - FFL Coach", sub:"Pre-race touchpoint — cross-promotion of the magazine via the Fit for Life Coach", months:["2026-10","2026-12"], effort:"med", impact:"med", status:"todo" },
  { stream:"magazine", category:"Touchpoints & teasers", name:"follow-up emails on sample receivers", sub:"Create a dedicated communication on the receivers of the magazine samples", months:["2026-10","2026-12"], effort:"med", impact:"high", status:"todo" },
  { stream:"magazine", category:"Strategy & foundations", name:"Digital Presence by partners", sub:"Define a strategy for digital acquisition by partners (define best practices and acquisition strategy)", months:["2026-10","2026-12"], effort:"vhigh", impact:"med", status:"todo", type:"foundation" },
];

const streamMeta = {
  global:   { label:"Global", dot:"dot-global" },
  coach:    { label:"Coach", dot:"dot-coach" },
  b2b:      { label:"B2B", dot:"dot-b2b" },
  b2c:      { label:"B2C", dot:"dot-b2c" },
  data:     { label:"Data collection", dot:"dot-data" },
  magazine: { label:"Fit for Life Magazine", dot:"dot-magazine" },
};
const effortLabels = { low:"Low", med:"Medium", high:"High", vhigh:"Very High" };
const impactLabels = { low:"Low", med:"Medium", high:"High", vhigh:"Very high" };
const statusLabels = { todo:"To do", inprogress:"In progress", done:"Done" };

let activeStream = "all";
let activeStatus = "all";
let activeRoadmapStream = "all";
const expandedCategories = new Set();

function inStream(m, s) {
  return Array.isArray(m.stream) ? m.stream.includes(s) : m.stream === s;
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

function monthKeySort(key) {
  const [y, mo] = key.split("-").map(Number);
  return y * 12 + mo;
}
function monthKeyToDate(key) {
  const [y, mo] = key.split("-").map(Number);
  return new Date(y, mo - 1, 1);
}
function monthKeyLabel(key) {
  const [y, mo] = key.split("-").map(Number);
  return `${monthNames[mo - 1]} '${String(y).slice(2)}`;
}
// Normalizes a measure's `months` (1 entry = single month, 2 entries = start/end range)
// into concrete date bounds. `end` is exclusive (first day of the month after the last covered month).
function measureMonthBounds(m) {
  const sorted = [...m.months].sort((a, b) => monthKeySort(a) - monthKeySort(b));
  const startKey = sorted[0];
  const endKey = sorted[sorted.length - 1];
  const lastDate = monthKeyToDate(endKey);
  return {
    startKey, endKey,
    start: monthKeyToDate(startKey),
    end: new Date(lastDate.getFullYear(), lastDate.getMonth() + 1, 1),
  };
}
function measureMonthLabel(m) {
  const { startKey, endKey } = measureMonthBounds(m);
  return startKey === endKey ? monthKeyLabel(startKey) : `${monthKeyLabel(startKey)} – ${monthKeyLabel(endKey)}`;
}

function measureRowHtml(m) {
  return `<div class="measure-row${m.status === 'done' ? ' is-done' : m.status === 'inprogress' ? ' is-inprogress' : ''}">
    <div><div class="measure-name">${m.name}${m.type === "foundation" ? `<span class="badge badge-foundation">Foundation</span>` : ""}</div>${m.sub ? `<div class="measure-sub">${m.sub}</div>` : ""}</div>
    <div><span class="badge badge-q">${measureMonthLabel(m)}</span></div>
    <div><span class="badge effort-${m.effort}">${effortLabels[m.effort]}</span></div>
    <div><span class="badge impact-${m.impact}">${impactLabels[m.impact]}</span></div>
    <div><span class="badge status-${m.status}">${statusLabels[m.status]}</span></div>
  </div>`;
}

function renderSummary(data) {
  const total      = data.length;
  const done       = data.filter(m => m.status === "done").length;
  const inprogress = data.filter(m => m.status === "inprogress").length;
  const quickWins  = data.filter(m => m.effort === "low" && (m.impact === "high" || m.impact === "vhigh")).length;
  const q3Months   = new Set(["2026-07","2026-08","2026-09"]);
  const q3         = data.filter(m => q3Months.has(measureMonthBounds(m).startKey)).length;
  document.getElementById("summary").innerHTML = `
    <div class="metric"><div class="metric-label">Total measures</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Done</div><div class="metric-value" style="color:#2d6a4a">${done}</div></div>
    <div class="metric"><div class="metric-label">In progress</div><div class="metric-value" style="color:#854F0B">${inprogress}</div></div>
    <div class="metric"><div class="metric-label">Quick wins</div><div class="metric-value">${quickWins}</div></div>
    <div class="metric"><div class="metric-label">To deliver Q3 2026</div><div class="metric-value">${q3}</div></div>
  `;
}

const streamOrder = ["global","coach","b2b","b2c","data","magazine"];

function groupByCategory(stream) {
  const groups = new Map();
  measures.filter(m => inStream(m, stream)).forEach(m => {
    const key = m.category || "Other";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(m);
  });
  return groups;
}

function renderRoadmapSummary() {
  const streams = activeRoadmapStream === "all" ? streamOrder : [activeRoadmapStream];
  const rows = measures.filter(m => streams.some(s => inStream(m, s)));
  const total      = rows.length;
  const done       = rows.filter(m => m.status === "done").length;
  const inprogress = rows.filter(m => m.status === "inprogress").length;
  const todo       = total - done - inprogress;
  const categoryKeys = new Set();
  streams.forEach(s => groupByCategory(s).forEach((_, category) => categoryKeys.add(`${s}::${category}`)));
  document.getElementById("roadmap-summary").innerHTML = `
    <div class="metric"><div class="metric-label">Categories</div><div class="metric-value">${categoryKeys.size}</div></div>
    <div class="metric"><div class="metric-label">Measures</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">Done</div><div class="metric-value" style="color:#2d6a4a">${done}</div></div>
    <div class="metric"><div class="metric-label">In progress</div><div class="metric-value" style="color:#854F0B">${inprogress}</div></div>
    <div class="metric"><div class="metric-label">To do</div><div class="metric-value">${todo}</div></div>
  `;
}

const allMonthKeys = [...new Set(measures.flatMap(m => m.months))].sort((a, b) => monthKeySort(a) - monthKeySort(b));
const timelineStart = monthKeyToDate(allMonthKeys[0]);
const timelineEndExclusive = measureMonthBounds({ months: [allMonthKeys[allMonthKeys.length - 1]] }).end;
const timelineMonths = [];
for (let d = new Date(timelineStart); d < timelineEndExclusive; d.setMonth(d.getMonth() + 1)) {
  timelineMonths.push(new Date(d));
}
function monthIndexFromStart(date) {
  return (date.getFullYear() - timelineStart.getFullYear()) * 12 + (date.getMonth() - timelineStart.getMonth());
}
function monthHeaderLabel(date) {
  const showYear = date.getMonth() === 0 || monthIndexFromStart(date) === 0;
  return showYear ? `${monthNames[date.getMonth()]} '${String(date.getFullYear()).slice(2)}` : monthNames[date.getMonth()];
}

function renderRoadmap() {
  renderRoadmapSummary();
  const n = timelineMonths.length;
  const timelineEnd = timelineEndExclusive;
  const now = new Date();
  const todayFrac = (now - timelineStart) / (timelineEnd - timelineStart);
  const showToday = todayFrac >= 0 && todayFrac <= 1;
  const todayPct = (todayFrac * 100).toFixed(2);
  const gridBg = `repeating-linear-gradient(to right, rgba(0,0,0,0.09) 0, rgba(0,0,0,0.09) 1px, transparent 1px, transparent calc(100%/${n / 3})), repeating-linear-gradient(to right, rgba(0,0,0,0.035) 0, rgba(0,0,0,0.035) 1px, transparent 1px, transparent calc(100%/${n}))`;
  const todayLine = showToday ? `<div class="gantt-today" style="left:${todayPct}%"></div>` : "";

  let html = "";
  const streamsToShow = activeRoadmapStream === "all" ? streamOrder : [activeRoadmapStream];
  streamsToShow.forEach(s => {
    const groups = groupByCategory(s);
    if (!groups.size) return;
    const meta = streamMeta[s];
    html += `<div class="stream-section">
      <div class="stream-label"><span class="dot ${meta.dot}"></span>${meta.label}</div>
      <div class="gantt-wrap">
        <div class="gantt-header">
          <div class="gantt-label"></div>
          <div class="gantt-header-months">
            ${timelineMonths.map(d => `<div>${monthHeaderLabel(d)}</div>`).join("")}
            ${showToday ? `<div class="gantt-today" style="left:${todayPct}%"></div><div class="gantt-today-label" style="left:${todayPct}%">Today</div>` : ""}
          </div>
        </div>
        ${[...groups.entries()].map(([category, rows]) => {
          const key = `${s}::${slugify(category)}`;
          const isOpen = expandedCategories.has(key);
          const rowBounds = rows.map(measureMonthBounds);
          const catStart = new Date(Math.min(...rowBounds.map(b => b.start.getTime())));
          const catEnd = new Date(Math.max(...rowBounds.map(b => b.end.getTime())));
          const startIdx = monthIndexFromStart(catStart);
          const endIdxExclusive = monthIndexFromStart(catEnd);
          const leftPct = startIdx / n * 100;
          const widthPct = (endIdxExclusive - startIdx) / n * 100;
          const doneCount = rows.filter(m => m.status === "done").length;
          const inprogressCount = rows.filter(m => m.status === "inprogress").length;
          const todoCount = rows.length - doneCount - inprogressCount;
          const hasFoundation = rows.some(m => m.type === "foundation");
          const segs = [
            { st: "done", count: doneCount },
            { st: "inprogress", count: inprogressCount },
            { st: "todo", count: todoCount },
          ].filter(seg => seg.count > 0)
           .map(seg => `<div class="gantt-seg seg-${seg.st}" style="width:${(seg.count / rows.length * 100).toFixed(2)}%"></div>`)
           .join("");
          const summaryLabel = `${rows.length} measure${rows.length > 1 ? "s" : ""} · ${doneCount} done · ${inprogressCount} in progress · ${todoCount} to do`;
          return `<div class="gantt-row category-row" data-stream="${s}" data-category="${slugify(category)}">
              <div class="gantt-label">
                <div class="gantt-label-title"><span class="chevron">${isOpen ? "▾" : "▸"}</span>${category}${hasFoundation ? `<span class="found-dot" title="Includes foundational / upstream work"></span>` : ""}</div>
                <div class="gantt-label-sub">${summaryLabel}</div>
              </div>
              <div class="gantt-track" style="background-image:${gridBg}">
                ${todayLine}
                <div class="gantt-bar" style="left:calc(${leftPct}% + 2px); width:calc(${widthPct}% - 4px)" title="${category} — ${summaryLabel}">${segs}</div>
              </div>
            </div>
            ${isOpen ? `<div class="category-detail">
              ${rows.map(m => {
                const { start, end } = measureMonthBounds(m);
                const mStartIdx = monthIndexFromStart(start);
                const mEndIdxExclusive = monthIndexFromStart(end);
                const mLeftPct = mStartIdx / n * 100;
                const mWidthPct = (mEndIdxExclusive - mStartIdx) / n * 100;
                return `<div class="gantt-row measure-subrow">
                  <div class="gantt-label">
                    <div class="gantt-label-title">${m.name}${m.type === "foundation" ? `<span class="found-dot" title="Foundational / upstream work"></span>` : ""}<span class="badge status-${m.status}">${statusLabels[m.status]}</span></div>
                    ${m.sub ? `<div class="gantt-label-sub">${m.sub}</div>` : ""}
                  </div>
                  <div class="gantt-track" style="background-image:${gridBg}">
                    ${todayLine}
                    <div class="gantt-bar seg-${m.status}" style="left:calc(${mLeftPct}% + 2px); width:calc(${mWidthPct}% - 4px)" title="${m.name} — ${measureMonthLabel(m)}"></div>
                  </div>
                </div>`;
              }).join("")}
            </div>` : ""}`;
        }).join("")}
      </div>
    </div>`;
  });
  html += `<div class="roadmap-legend">
    <span><span class="legend-seg seg-todo"></span>To do</span>
    <span><span class="legend-seg seg-inprogress"></span>In progress</span>
    <span><span class="legend-seg seg-done"></span>Done</span>
    <span><span class="found-dot"></span>Foundational / upstream work</span>
  </div>`;
  document.getElementById("roadmap").innerHTML = html;
}

function renderTable() {
  const streams = activeStream === "all" ? ["global","coach","b2b","b2c","data","magazine"] : [activeStream];
  const filtered = measures.filter(m =>
    (activeStream === "all" || inStream(m, activeStream)) &&
    (activeStatus === "all" || m.status === activeStatus)
  );
  renderSummary(filtered);
  let html = "";
  streams.forEach(s => {
    const rows = measures.filter(m =>
      inStream(m, s) &&
      (activeStatus === "all" || m.status === activeStatus)
    );
    if (!rows.length) return;
    const meta = streamMeta[s];
    html += `<div class="stream-section">
      <div class="stream-label"><span class="dot ${meta.dot}"></span>${meta.label}</div>
      <div class="table-wrap">
        <div class="col-headers">
          <div class="col-header">Measure</div>
          <div class="col-header">Month</div>
          <div class="col-header">Effort</div>
          <div class="col-header">Impact</div>
          <div class="col-header">Status</div>
        </div>
        ${rows.map(measureRowHtml).join("")}
      </div>
    </div>`;
  });
  document.getElementById("table-container").innerHTML = html;
}

document.getElementById("roadmap-filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeRoadmapStream = btn.dataset.stream;
  document.querySelectorAll("#roadmap-filters .filter-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderRoadmap();
});

document.getElementById("roadmap").addEventListener("click", e => {
  const row = e.target.closest(".category-row");
  if (!row) return;
  const key = `${row.dataset.stream}::${row.dataset.category}`;
  if (expandedCategories.has(key)) expandedCategories.delete(key);
  else expandedCategories.add(key);
  renderRoadmap();
});

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeStream = btn.dataset.stream;
  document.querySelectorAll("#filters .filter-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderTable();
});

document.getElementById("status-filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  activeStatus = btn.dataset.status;
  document.querySelectorAll("#status-filters .filter-btn").forEach(b => b.classList.toggle("active", b === btn));
  renderTable();
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b === btn));
    const tab = btn.dataset.tab;
    document.getElementById("tab-roadmap").style.display = tab === "roadmap" ? "" : "none";
    document.getElementById("tab-mesures").style.display = tab === "mesures" ? "" : "none";
  });
});

renderRoadmap();
renderTable();
</script>
